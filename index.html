<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Candle Timer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #0f0f0f;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }
        .candle {
            font-size: 55vw;
            font-weight: 700;
            line-height: 1;
            margin: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .time {
            font-size: 50vw;
            font-weight: 600;
            margin: 10px 0 0 0;
            letter-spacing: -2px;
        }
        /* Phones in portrait: viewport is narrow, so scale up by width */
        @media (orientation: portrait) {
            .candle { font-size: 65vw; }
            .time   { font-size: 40vw; }
        }
    </style>
</head>
<body>
    <div class="candle" id="candle">1</div>
    <div class="time" id="time">15</div>
    <script>
        function updateCandle() {
            const now = new Date();
            const seconds = now.getSeconds();
            
            // Current 15-second interval (1,2,3,4)
            const interval = Math.floor(seconds / 15) + 1;
            const candleElement = document.getElementById('candle');
            
            candleElement.textContent = interval;
            // Color coding
            switch(interval) {
                case 1: candleElement.style.color = '#ff3b3b'; break;     // Red
                case 2: candleElement.style.color = '#00ff7f'; break;     // Green
                case 3: candleElement.style.color = '#ffd700'; break;     // Yellow/Gold
                case 4: candleElement.style.color = '#ff8c00'; break;     // Orange
            }
            // Remaining seconds in current 15s cycle
            const remaining = 15 - (seconds % 15);
            document.getElementById('time').textContent = remaining;
        }
        // Update every second
        setInterval(updateCandle, 1000);
        updateCandle(); // Initial call
    </script>
</body>
</html>
